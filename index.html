<script>
window.onload = function(){

/* Pakistan timezone-safe birthday time */
const targetDate = new Date("2026-04-20T00:00:00+05:00").getTime();

const btn = document.getElementById("enterBtn");
const countdownEl = document.getElementById("countdown");

let redirected = false;

function updateCountdown(){

const now = Date.now();
const diff = targetDate - now;

/* when countdown finishes */
if(diff <= 0 && !redirected){

redirected = true;

countdownEl.innerHTML = "It's your day shoni ❤️";

/* enable button */
btn.style.opacity = "1";
btn.style.pointerEvents = "auto";

/* auto redirect after 2 seconds */
setTimeout(()=>{
window.location.href = "https://vvsayann.github.io/hennas-day/";
},2000);

return;
}

/* calculate remaining time */
const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
const seconds = Math.floor((diff % (1000*60)) / 1000);

/* update UI */
countdownEl.innerHTML =
days + "d " +
hours + "h " +
minutes + "m " +
seconds + "s";
}

/* run timer */
setInterval(updateCountdown,1000);
updateCountdown();

/* manual redirect button */
window.goMain = function(){
window.location.href = "https://vvsayann.github.io/hennas-day/";
};

};
</script>
