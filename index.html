<script>
window.addEventListener("load", function(){

const targetDate = new Date("2026-04-20T00:00:00+05:00").getTime();

const btn = document.getElementById("enterBtn");
const countdownEl = document.getElementById("countdown");

/* safety check (prevents white screen) */
if(!btn || !countdownEl){
console.error("Missing elements: check IDs (enterBtn / countdown)");
return;
}

let redirected = false;

function updateCountdown(){

const now = Date.now();
const diff = targetDate - now;

/* when countdown finishes */
if(diff <= 0 && !redirected){

redirected = true;

countdownEl.innerHTML = "It's your day shoni ❤️";

/* enable button */
btn.style.opacity = "1";
btn.style.pointerEvents = "auto";

/* redirect after 2 sec */
setTimeout(()=>{
window.location.href = "https://vvsayann.github.io/hennas-day/";
},2000);

return;
}

/* prevent negative values showing */
if(diff < 0) return;

/* calculate time */
const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
const seconds = Math.floor((diff % (1000*60)) / 1000);

/* update UI */
countdownEl.innerHTML =
days + "d " +
hours + "h " +
minutes + "m " +
seconds + "s";
}

/* start */
setInterval(updateCountdown,1000);
updateCountdown();

/* button redirect */
window.goMain = function(){
window.location.href = "https://vvsayann.github.io/hennas-day/";
};

});
</script>
