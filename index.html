<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Countdown ❤️</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#ffdde1,#ee9ca7,#ffd1dc);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
text-align:center;
cursor: url('cursor.cur') 16 16, auto;
color:#333;
}

.box{
background:rgba(255,255,255,0.3);
padding:30px;
border-radius:25px;
backdrop-filter:blur(10px);
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.glow{
color:#ff3d6e;
text-shadow:0 0 10px #ff4d6d,0 0 20px #ff4d6d;
}

#countdown{
font-size:28px;
margin-top:15px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff4d6d;
color:white;
border-radius:25px;
font-size:16px;
opacity:0.5;
pointer-events:none;
}
</style>
</head>

<body>

<div class="box">
<h1 class="glow">Your Surprise Awaits ❤️</h1>
<div id="countdown">Loading...</div>
<button id="enterBtn" onclick="goMain()">Aithe aa soniye 💖</button>
</div>

<script>
const targetDate = new Date("April 20, 2026 00:00:00").getTime();
const btn = document.getElementById("enterBtn");

function updateCountdown(){
const now = new Date().getTime();
const diff = targetDate - now;

if(diff <= 0){
document.getElementById("countdown").innerHTML = "It's your day shoni ❤️";

/* enable button */
btn.style.opacity = "1";
btn.style.pointerEvents = "auto";

/* auto redirect after 2 sec */
setTimeout(()=>{
window.location.href = "https://vvsayann.github.io/hennas-birthday/";
},2000);

return;
}

let days = Math.floor(diff / (1000*60*60*24));
let hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
let minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
let seconds = Math.floor((diff % (1000*60)) / 1000);

document.getElementById("countdown").innerHTML =
days + "d " + hours + "h " + minutes + "m " + seconds + "s";
}

setInterval(updateCountdown,1000);
updateCountdown();

function goMain(){
window.location.href = "https://vvsayann.github.io/hennas-birthday/page1.html";
}

document.addEventListener("mousemove",function(e){
let heart=document.createElement("div");
heart.innerHTML="💖";
heart.style.position="fixed";
heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";
heart.style.pointerEvents="none";
heart.style.transition="0.6s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.style.transform="translateY(-20px)";
heart.style.opacity="0";
},10);

setTimeout(()=>heart.remove(),600);
});
</script>

</body>
</html>
